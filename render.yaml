services:
  - type: web
    name: xadrez3d-mobile-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DEFAULT_ANALYSIS_DEPTH
        value: 12
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STOCKFISH_PATH
        sync: false
